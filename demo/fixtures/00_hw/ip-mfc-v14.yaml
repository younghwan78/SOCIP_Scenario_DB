id: ip-mfc-v14
schema_version: "2.2"
kind: ip
category: codec
rtl_version: "14.0"
compatible_soc:
  - soc-exynos2500

hierarchy:
  type: simple

capabilities:
  operating_modes:
    - id: normal
      throughput_mpps: 120
    - id: high_throughput
      min_clock_mhz: 400.0
      throughput_mpps: 240

  supported_features:
    bitdepth: [8, 10]
    hdr_formats: [HDR10, HDR10plus]
    compression: [AFBC_v2]

sim_params:
  hw_name_in_sim: "MFC"
  ppc: 1.0
  unit_power_mw_mp: 5.0
  idc: 0.3
  vdd: "VDD_MFC"
  dvfs_group: "INT"
  latency_us: 0.0
  ports:
    - name: "RDMA"
      type: "DMA_READ"
      max_bw_gbps: 12.8
    - name: "WDMA"
      type: "DMA_WRITE"
      max_bw_gbps: 6.4
